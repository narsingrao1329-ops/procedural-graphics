<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32x32 Animated Pixel Art Knight</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2b2b2b;
            margin: 0;
            font-family: monospace;
        }
        canvas {
            image-rendering: pixelated; 
            background-color: #3b3b3b;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-family: inherit;
            background-color: #444;
            color: #fff;
            border: 2px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #666;
        }
        button:active {
            transform: scale(0.95);
            border-color: #e60000;
        }
        button.active-state {
            border-color: #e0f7fa;
            background-color: #555;
        }
    </style>
</head>
<body>

<canvas id="knightCanvas" width="256" height="256"></canvas>

<div class="controls">
    <button id="btn-attention" class="active-state" onclick="setState('attention')">Attention</button>
    <button id="btn-ease" onclick="setState('atEase')">At Ease</button>
    <button id="btn-walk" onclick="setState('walk')">Walk</button>
    <button id="btn-charge" onclick="setState('charge')">Charge</button>
</div>

            ".........######................."
        ]
    };

    // 3. Engine State & Variables
    let currentState = 'attention';
    let currentFrameArray = frames.attention;
    
    // Animation timing logic
    let lastTime = 0;
    let timer = 0;
    const walkFPS = 4; // Swaps walk frames 4 times a second
    const walkInterval = 1000 / walkFPS; 
    let walkToggle = true;

    // 4. Input Handling
    window.setState = function(newState) {
        if (currentState === newState) return; // Prevent resetting if already in state
        currentState = newState;

        // UI update
        document.querySelectorAll('button').forEach(btn => btn.classList.remove('active-state'));
        document.getElementById(`btn-${newState.replace('atEase', 'ease')}`).classList.add('active-state');

        // Reset walk cycle timing when entering walk state
        if (newState === 'walk') {
            timer = 0;
            walkToggle = true;
            currentFrameArray = frames.walk1;
        } else {
            currentFrameArray = frames[newState];
        }
    }

    // 5. Render Function (Optimized for Loop)
    function renderFrame(canvasId, artArray, colorPalette) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const rows = artArray.length;
        const cols = artArray[0].length;
        const pixelWidth = canvas.width / cols;
        const pixelHeight = canvas.height / rows;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                const char = artArray[y][x];
                const color = colorPalette[char];

                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        Math.floor(x * pixelWidth), 
                        Math.floor(y * pixelHeight), 
                        Math.ceil(pixelWidth), 
                        Math.ceil(pixelHeight)
                    );
                }
            }
        }
    }

    // 6. Game Loop (Delta-Time based to prevent refresh-rate bugs)
    function gameLoop(timestamp) {
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        // Process animations based on state
        if (currentState === 'walk') {
            timer += deltaTime;
            if (timer > walkInterval) {
                walkToggle = !walkToggle;
                currentFrameArray = walkToggle ? frames.walk1 : frames.walk2;
                timer = 0; // Reset timer for next tick
            }
        }

        renderFrame('knightCanvas', currentFrameArray, palette);
        requestAnimationFrame(gameLoop);
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(gameLoop);
    });
</script>
</body>
</html>
